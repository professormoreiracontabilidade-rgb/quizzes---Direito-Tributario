*{box-sizing:border-box}body{margin:0;background:#eef5fc;color:#102a43;font-family:Arial,sans-serif}.top{background:#062a52;color:white;text-align:center;padding:14px 10px}.top h1{font-size:20px;margin:0}.top p{color:#ffe45c;margin:5px 0 0;font-size:13px}.wrap{max-width:850px;margin:auto}.menu h2{text-align:center;background:#0a3f78;color:white;margin:0;padding:38px 10px 12px}.grid{padding:0 0 24px}.quizBtn{display:block;width:100%;border:0;border-bottom:12px solid #07386c;background:linear-gradient(100deg,#0b56a0,#1684dc);color:white;padding:20px;cursor:pointer}.quizBtn b{display:block;font-size:20px}.quizBtn span{font:14px Georgia,serif}.card{margin:15px;background:white;border-radius:14px;padding:20px;box-shadow:0 5px 22px #07386c22}.meta{color:#0b64b4;font-weight:bold}.q{font-size:19px;line-height:1.45;font-weight:bold;margin:15px 0}.opt{display:block;width:100%;text-align:left;margin:9px 0;padding:14px;border:2px solid #cbd9e7;border-radius:10px;background:#fff;font-size:16px}.opt.correct{background:#dff7e6;border-color:#149447}.opt.wrong{background:#ffe1e1;border-color:#d82929}.comment{background:#fff4c9;border-left:5px solid #e0aa00;padding:13px;margin-top:15px;line-height:1.45}.nav{display:flex;gap:8px;margin-top:15px}.nav button,.action{border:0;border-radius:9px;padding:13px 16px;background:#0b64b4;color:white;font-weight:bold;cursor:pointer}.nav button{flex:1}.nav button:disabled{opacity:.4}.hide{display:none}.result{text-align:center}.score{font-size:42px;color:#0b64b4;font-weight:bold}@media(max-width:500px){.card{margin:9px;padding:16px}.q{font-size:17px}.opt{font-size:15px}.top h1{font-size:18px}}
</style></head><body><header class="top"><h1>Curso de Contabilidade Professor Moreira</h1><p>10 QUIZZES FGV • DIREITO TRIBUTÁRIO • TREINAMENTO PESADO</p></header><main class="wrap"><section id="menu" class="menu"><h2>Escolha o Quiz</h2><div id="grid" class="grid"></div></section><section id="game" class="hide"><div class="card"><div id="meta" class="meta"></div><div id="q" class="q"></div><div id="opts"></div><div id="comment" class="comment hide"></div><div class="nav"><button onclick="goMenu()">Menu</button><button id="prev" onclick="move(-1)">Voltar</button><button id="next" onclick="move(1)">Avançar</button></div></div></section><section id="result" class="hide"><div class="card result"><h2>Resultado final</h2><div id="score" class="score"></div><p id="msg"></p><button class="action" onclick="restart()">Reiniciar Quiz</button> <button class="action" onclick="goMenu()">Menu dos Quizzes</button></div></section></main><script>
const BANK=[{"q": "Um Prefeito propõe que os moradores de um município paguem o Imposto Predial e Territorial Urbano (IPTU) atrasado prestando serviços de limpeza em praças públicas. De acordo com o Código Tributário Nacional, essa proposta é:", "o": ["Válida, pois atende à flexibilidade do pagamento de obrigações ao Estado.", "Válida, desde que haja acordo formal entre o Município e os moradores.", "Inválida, pois o tributo é uma prestação pecuniária e não pode ser pago com trabalho.", "Inválida, pois o tributo tem um caráter exclusivo de punição."], "a": 2, "c": "A alternativa C está correta. Nos termos do CTN, tributo é uma prestação pecuniária compulsória. Portanto, não pode, como regra, ser quitado mediante prestação de serviços (in labore). Além disso, tributo não constitui sanção por ato ilícito."}, {"q": "Uma indústria foi autuada pela fiscalização ambiental por poluir um rio e recebeu uma alta multa financeira. O departamento contábil da empresa classificou esse valor a pagar como um novo tributo. Essa classificação está:", "o": ["Correta, pois toda obrigação financeira compulsória repassada ao Estado é tributo.", "Correta, desde que a multa esteja prevista em lei.", "Incorreta, pois a natureza jurídica do tributo impede que ele seja uma sanção de ato ilícito.", "Incorreta, pois a multa ambiental é classificada como uma obrigação acessória."], "a": 2, "c": "A alternativa C está correta. A multa ambiental decorre da prática de um ato ilícito; por isso, tem natureza de sanção e não de tributo. Atenção à regra: tributo não é multa."}, {"q": "Durante uma fiscalização de rotina, um auditor da Receita constata que uma empresa deve R$ 50.000 em tributos. Por ser amigo do dono da empresa, o auditor decide perdoar a dívida e não realizar a cobrança. A conduta do auditor é:", "o": ["Lícita, pois a cobrança de tributos é discricionária e o fiscal decide quando atuar.", "Ilícita, pois a cobrança de tributos ocorre estritamente mediante atividade administrativa vinculada.", "Lícita, pois o fiscal pode exigir o pagamento em bens (*in natura*) em vez de dinheiro.", "Ilícita, pois o perdão só poderia ocorrer se o tributo fosse convertido em prestação de serviços."], "a": 1, "c": "A alternativa B está correta. A cobrança do tributo é realizada mediante atividade administrativa plenamente vinculada. Assim, preenchidos os requisitos legais, o agente público não pode decidir livremente se realizará ou não a cobrança."}, {"q": "Determinado ente federativo instituiu um tributo cujo fato gerador independe de qualquer atuação estatal específica relativa ao contribuinte. Considerando essa característica, qual é a espécie tributária?", "o": ["Taxa.", "Contribuição de Melhoria.", "Imposto.", "Empréstimo Compulsório."], "a": 2, "c": "A alternativa C está correta. O imposto é um tributo não vinculado: sua cobrança independe de uma atuação estatal específica diretamente relacionada ao contribuinte."}, {"q": "Um Município instituiu um tributo para financiar a coleta de lixo nas residências locais. Considerando a teoria pentapartida, essa cobrança possui natureza jurídica de:", "o": ["Imposto.", "Taxa.", "Contribuição de Melhoria.", "Contribuição Especial."], "a": 1, "c": "A alternativa B está correta. A coleta domiciliar de lixo é serviço público específico e divisível, podendo fundamentar a cobrança de taxa."}, {"q": "A Prefeitura Municipal pavimentou diversas vias urbanas, resultando na direta valorização imobiliária das casas daquela localidade. Para custear os gastos com a obra, o Município está autorizado a cobrar:", "o": ["Taxa de Obras Públicas.", "Imposto sobre o Valor Agregado.", "Contribuição de Melhoria.", "Empréstimo Compulsório."], "a": 2, "c": "A alternativa C está correta. A contribuição de melhoria pode ser instituída quando uma obra pública provoca valorização imobiliária, observados os limites legais da cobrança."}, {"q": "Em uma situação de guerra iminente, o Presidente da República cogita instituir um Empréstimo Compulsório para arrecadar fundos. Para que a criação deste tributo seja válida, é obrigatório o uso de:", "o": ["Decreto do Executivo.", "Lei Ordinária.", "Lei Complementar.", "Medida Provisória."], "a": 2, "c": "A alternativa C está correta. O empréstimo compulsório é de competência exclusiva da União e somente pode ser instituído mediante lei complementar."}, {"q": "O Empréstimo Compulsório, tributo de competência da União, pode ser criado em hipóteses específicas. Assinale a opção que NÃO se enquadra como uma dessas hipóteses:", "o": ["Guerra.", "Calamidade pública.", "Investimento público de caráter urgente e de relevante interesse nacional.", "Financiamento da folha de pagamento regular dos servidores do Estado."], "a": 3, "c": "A alternativa D está correta. A Constituição autoriza o empréstimo compulsório para atender a despesas extraordinárias decorrentes de calamidade pública, guerra externa ou sua iminência, bem como para investimento público urgente e de relevante interesse nacional."}, {"q": "O Governo Federal cobra uma contribuição incidente sobre o faturamento das empresas (COFINS), cujos recursos não vão para o caixa geral, mas possuem uma finalidade específica de custeio. Trata-se de qual espécie tributária?", "o": ["Imposto.", "Taxa.", "Contribuição Especial.", "Contribuição de Melhoria."], "a": 2, "c": "A alternativa C está correta. A COFINS é uma contribuição social destinada ao financiamento da seguridade social, integrando o grupo das contribuições especiais."}, {"q": "Para fins de estudo para a prova do CFC, um aluno precisa agrupar os tributos pertencentes aos Municípios. Utilizando o macete adequado, os impostos municipais são:", "o": ["ICMS, ITCMD, IPVA.", "IPTU, ITBI, ISS.", "II, IE, IR.", "IPI, IOF, ITR."], "a": 1, "c": "A alternativa B está correta. São impostos de competência municipal: IPTU, ITBI e ISS."}, {"q": "Um pai decidiu doar uma fazenda para o seu filho. Sobre a transferência desse imóvel por doação, incidirá um imposto de competência:", "o": ["Municipal, o ITBI.", "Estadual, o ITCMD.", "Federal, o ITR.", "Estadual, o ICMS."], "a": 1, "c": "A alternativa B está correta. A transmissão de bens por doação ou por causa da morte está sujeita ao ITCMD, imposto de competência dos Estados e do Distrito Federal."}, {"q": "Assinale a alternativa que contém EXCLUSIVAMENTE impostos da esfera Federal:", "o": ["IPTU, ISS e ITBI.", "ICMS, IPVA e ITCMD.", "II, IR, ITR e Imposto Seletivo.", "IOF, IPI, IPTU e ISS."], "a": 2, "c": "A alternativa C está correta. Todos os impostos apresentados nessa opção — II, IR, ITR e Imposto Seletivo — são de competência da União."}, {"q": "Uma padaria vendeu dezenas de bolos, mas falhou em emitir a nota fiscal para os clientes, o que gerou uma autuação fiscal (multa). No Direito Tributário, a obrigatoriedade de emitir nota fiscal e o dever de pagar a multa são classificados, respectivamente, como obrigações:", "o": ["Principal e Principal.", "Acessória e Acessória.", "Principal e Acessória.", "Acessória e Principal."], "a": 3, "c": "A alternativa D está correta. Emitir nota fiscal é uma obrigação acessória. Já a penalidade pecuniária decorrente de seu descumprimento integra a obrigação principal, pois envolve o pagamento de dinheiro."}, {"q": "Um contribuinte possui uma dívida ativa referente ao não pagamento do Imposto sobre a Propriedade de Veículos Automotores (IPVA). Nessa relação tributária, o Estado que realiza a cobrança atua como:", "o": ["Sujeito Ativo.", "Sujeito Passivo.", "Responsável Solidário.", "Fiel Depositário."], "a": 0, "c": "A alternativa A está correta. Sujeito ativo é a pessoa jurídica de direito público titular da competência para exigir o cumprimento da obrigação tributária."}, {"q": "A pedido do Governador, foi publicado um decreto majorando imediatamente todas as alíquotas de impostos estaduais para cobrir um déficit nas contas. Essa medida fere diretamente o princípio tributário da:", "o": ["Isonomia.", "Legalidade.", "Irretroatividade.", "Não Confisco."], "a": 1, "c": "A alternativa B está correta. Como regra, somente a lei pode instituir ou aumentar tributos. Existem exceções constitucionais quanto à alteração de determinadas alíquotas, mas elas não autorizam a majoração indiscriminada de todos os impostos estaduais por decreto."}, {"q": "Uma lei que criou um novo tributo municipal foi sancionada em março de 2024 e tenta cobrar impostos de fatos ocorridos em novembro de 2023. Tal cobrança é proibida pelo princípio da:", "o": ["Anterioridade.", "Não Confisco.", "Irretroatividade.", "Isonomia."], "a": 2, "c": "A alternativa C está correta. A irretroatividade impede a cobrança de tributo em relação a fatos geradores ocorridos antes do início da vigência da lei que o instituiu ou aumentou."}, {"q": "Foi promulgada em 15 de dezembro uma lei que aumenta um imposto. Respeitada a regra geral da Anterioridade no Direito Tributário brasileiro, essa nova carga só poderá ser exigida do contribuinte após:", "o": ["O primeiro dia do ano seguinte (1º de janeiro), não importando os dias corridos.", "Apenas 90 dias após a publicação, independentemente do ano.", "Esperar a virada do ano seguinte **e** cumprir o prazo de 90 dias da publicação.", "Passados 12 meses completos da aprovação da lei."], "a": 2, "c": "A alternativa C está correta. Pela regra geral, devem ser observadas cumulativamente a anterioridade anual — cobrança somente no exercício financeiro seguinte — e a anterioridade nonagesimal — espera mínima de 90 dias. Há exceções constitucionais para determinados tributos."}, {"q": "A Assembleia Legislativa aprova um tributo que compromete 90% da renda líquida anual dos cidadãos do Estado, forçando muitos a venderem suas casas para quitar a dívida fiscal. Essa tributação é inconstitucional pois viola o princípio do(a):", "o": ["Legalidade.", "Isonomia.", "Anterioridade.", "Não Confisco."], "a": 3, "c": "A alternativa D está correta. O princípio do não confisco impede que a tributação seja tão excessiva a ponto de absorver parcela substancial do patrimônio ou da renda do contribuinte."}, {"q": "Uma igreja foi notificada pela prefeitura para recolher o IPTU e a Taxa de Coleta de Lixo de seus templos. O líder religioso recorre, alegando ter imunidade tributária. Sobre a abrangência dessa imunidade:", "o": ["A igreja está dispensada de pagar ambos, pois a imunidade é irrestrita.", "A igreja não precisa pagar o IPTU, mas deverá pagar a Taxa de Coleta de Lixo.", "A igreja deverá pagar o IPTU, mas ficará livre da Taxa de Coleta de Lixo.", "A imunidade só se aplica a templos se concedida previamente por uma isenção municipal."], "a": 1, "c": "A alternativa B está correta. A imunidade dos templos alcança impostos relacionados às suas finalidades essenciais, mas não impede, por si só, a cobrança de taxas decorrentes de serviços públicos específicos e divisíveis."}, {"q": "Ao diferenciar imunidade e isenção, é correto afirmar que a imunidade:", "o": ["É concedida por meio de uma lei específica e atua como dispensa de pagamento.", "É concedida livremente por ato administrativo da autoridade fiscal.", "Está prevista na própria Constituição, limitando o poder de tributar.", "Impede a cobrança de obrigações acessórias pelo Fisco."], "a": 2, "c": "A alternativa C está correta. A imunidade decorre diretamente da Constituição e limita a competência tributária. A isenção, por sua vez, é concedida por lei e constitui hipótese de exclusão do crédito tributário."}, {"q": "O dono de uma construtora descobre que determinadas negociações realizadas pela sua empresa não se enquadram nas hipóteses previstas pelo legislador para a cobrança do ISS. Esse cenário configura um caso de:", "o": ["Isenção.", "Imunidade.", "Evasão Fiscal.", "Não Incidência."], "a": 3, "c": "A alternativa D está correta. Na não incidência, o fato praticado não se enquadra na hipótese de incidência prevista na legislação tributária."}, {"q": "Todo início de ano, proprietários de veículos recebem em suas residências o boleto com o valor exato do IPVA a ser pago, calculado pelos próprios servidores estaduais. Essa sistemática caracteriza o lançamento:", "o": ["De Ofício.", "Por Homologação.", "Por Declaração.", "Por Arbitramento."], "a": 0, "c": "A alternativa A está correta. No lançamento de ofício, a autoridade administrativa realiza os atos necessários à constituição do crédito tributário. Exemplos clássicos são o IPTU e o IPVA, cujas cobranças normalmente chegam prontas ao contribuinte."}, {"q": "Ao adquirir uma casa nova, o comprador leva os dados da compra à Prefeitura, informando o valor do negócio para que as autoridades fazendárias analisem os dados e calculem o montante devido. Esse é um exemplo clássico do lançamento atrelado ao ITBI, que ocorre na modalidade:", "o": ["De Ofício.", "Por Homologação.", "Por Declaração.", "Judicial."], "a": 2, "c": "A alternativa C está correta. No lançamento por declaração, o contribuinte fornece ao Fisco as informações indispensáveis, e a autoridade administrativa calcula e constitui o crédito tributário."}, {"q": "Uma grande loja de departamentos faz diariamente a apuração de suas vendas, calcula o ICMS devido e efetua o recolhimento do dinheiro aos cofres estaduais, sem que haja uma cobrança prévia do governo, cabendo ao Estado apenas verificar a conformidade dos dados posteriormente. Esse tipo de lançamento é o:", "o": ["De Ofício.", "Por Homologação.", "Por Declaração.", "Isento."], "a": 1, "c": "A alternativa B está correta. No lançamento por homologação, o contribuinte apura e antecipa o pagamento sem exame prévio da autoridade administrativa, cabendo ao Fisco homologar posteriormente a atividade realizada."}, {"q": "Uma empresa de contabilidade reestruturou toda a operação societária de um cliente de forma estritamente legal e antes da ocorrência do fato gerador, resultando em uma redução drástica dos tributos pagos. A atitude do cliente e do contador configura:", "o": ["Evasão Fiscal.", "Elisão Fiscal.", "Sonegação.", "Fraude."], "a": 1, "c": "A alternativa B está correta. A elisão fiscal consiste no planejamento tributário lícito, realizado, em regra, antes da ocorrência do fato gerador, com o objetivo de reduzir a carga tributária dentro dos limites legais."}, {"q": "O dono de um supermercado, buscando aumentar seus lucros, decide esconder parte do seu faturamento mensal adulterando notas fiscais, ou seja, agindo após o momento da venda. No Direito Tributário, a ocultação dessa obrigação ilicitamente é chamada de:", "o": ["Evasão Fiscal.", "Elisão Fiscal.", "Imunidade Subjetiva.", "Não Incidência."], "a": 0, "c": "A alternativa A está correta. A evasão fiscal é uma conduta ilícita destinada a ocultar ou reduzir tributos devidos, como ocorre na adulteração de documentos e na omissão de receitas."}, {"q": "João é dono de uma empresa e o Fisco exige que, todos os meses, ele entregue uma declaração de movimentações financeiras, sob pena de multa caso atrase a entrega. A entrega dessa declaração constitui uma obrigação tributária:", "o": ["Principal.", "Acessória.", "Vinculada.", "Confiscatória."], "a": 1, "c": "A alternativa B está correta. Entregar declarações e escriturar livros são prestações positivas exigidas no interesse da arrecadação e da fiscalização, classificadas como obrigações acessórias."}, {"q": "A lei de um Município tentou estabelecer que moradores de um bairro rico pagariam um valor base de imposto consideravelmente maior do que as empresas do mesmo bairro, ainda que tivessem o mesmo patrimônio. Essa ação do legislador viola o princípio que exige tratamento igualitário aos equivalentes. Trata-se do Princípio da:", "o": ["Anterioridade.", "Irretroatividade.", "Isonomia.", "Legalidade."], "a": 2, "c": "A alternativa C está correta. A isonomia tributária proíbe tratamento desigual entre contribuintes que se encontrem em situação equivalente, salvo quando houver fundamento constitucionalmente legítimo para a diferenciação."}, {"q": "Para identificar o responsável pelo pagamento das obrigações tributárias, o Direito divide a relação entre quem cobra e quem paga. A pessoa, física ou jurídica, que sofre o dever de pagar (seja ela o contribuinte ou o responsável) é chamada de:", "o": ["Sujeito Ativo.", "Sujeito Vinculado.", "Sujeito Passivo.", "Sujeito Infrator."], "a": 2, "c": "A alternativa C está correta. Sujeito passivo é a pessoa obrigada ao pagamento do tributo ou da penalidade pecuniária, podendo ser contribuinte ou responsável tributário."}, {"q": "As obrigações tributárias podem ser desmembradas em \"Principal\" e \"Acessória\". Caso o cidadão entregue sua declaração de imposto, mas não pague o tributo devido (o montante de imposto), ele estará descumprindo qual tipo de obrigação?", "o": ["Obrigação Acessória.", "Obrigação Principal.", "Obrigação Declaratória.", "Obrigação Subsidiária."], "a": 1, "c": "A alternativa B está correta. A obrigação principal surge com a ocorrência do fato gerador e tem por objeto o pagamento do tributo ou de penalidade pecuniária."}, {"q": "Qual é a definição legal de tributo estabelecida no Art. 3º do Código Tributário Nacional (CTN)?", "o": ["Uma situação independente de qualquer atividade estatal específica relativa ao contribuinte.", "ISS, IPTU e ITBI.", "Prestação pecuniária compulsória, em moeda ou valor que nela se possa exprimir, instituída em lei e que não constitua sanção de ato ilícito.", "Municípios."], "a": 2, "c": "A alternativa correta é a C. Prestação pecuniária compulsória, em moeda ou valor que nela se possa exprimir, instituída em lei e que não constitua sanção de ato ilícito."}, {"q": "O tributo é cobrado mediante qual tipo de atividade administrativa?", "o": ["Não vinculada.", "ITCMD, ICMS e IPVA.", "O exercício regular do poder de polícia ou a utilização de serviço público específico e divisível.", "Atividade administrativa plenamente vinculada."], "a": 3, "c": "A alternativa correta é a D. Atividade administrativa plenamente vinculada."}, {"q": "De acordo com o conceito de tributo, o pagamento é facultativo ou compulsório?", "o": ["Compulsório, o que significa que o pagamento é obrigatório independentemente da vontade do contribuinte.", "A obrigação de pagar surge de um fato do contribuinte (ex: auferir renda) e não de uma ação do Estado.", "II, IE, IR e IPI.", "Quando o serviço é colocado à disposição do contribuinte, mesmo que ele não o utilize efetivamente."], "a": 0, "c": "A alternativa correta é a A. Compulsório, o que significa que o pagamento é obrigatório independentemente da vontade do contribuinte."}, {"q": "Qual a principal diferença entre tributo e multa quanto à sua natureza?", "o": ["O poder para instituir tributos atribuído pela Constituição Federal exclusivamente aos entes federados.", "O tributo não constitui sanção por ato ilícito (natureza não punitiva), enquanto a multa é uma sanção.", "União.", "Específico; divisível."], "a": 1, "c": "A alternativa correta é a B. O tributo não constitui sanção por ato ilícito (natureza não punitiva), enquanto a multa é uma sanção."}, {"q": "Como é determinada a natureza jurídica específica de um tributo segundo o Art. 4º do CTN?", "o": ["Não, a competência tributária é indelegável.", "Estadual e do Distrito Federal.", "Pelo fato gerador da respectiva obrigação.", "Porque não possui a característica de divisibilidade (é um serviço geral ou uti universi)."], "a": 2, "c": "A alternativa correta é a C. Pelo fato gerador da respectiva obrigação."}, {"q": "Para a qualificação de um tributo, a denominação dada pela lei e o destino da arrecadação são considerados _____.", "o": ["União, Estados, Distrito Federal e Municípios.", "Estados e Distrito Federal.", "Base de cálculo.", "Irrelevantes."], "a": 3, "c": "A alternativa correta é a D. Irrelevantes."}, {"q": "Quais são as cinco espécies tributárias existentes no sistema tributário nacional?", "o": ["Impostos, taxas, contribuições de melhoria, empréstimos compulsórios e contribuições especiais.", "ISS, IPTU e ITBI.", "Municípios.", "A valorização imobiliária decorrente de uma obra pública."], "a": 0, "c": "A alternativa correta é a A. Impostos, taxas, contribuições de melhoria, empréstimos compulsórios e contribuições especiais."}, {"q": "Como se define o fato gerador de um imposto conforme o Art. 16 do CTN?", "o": ["ITCMD, ICMS e IPVA.", "Uma situação independente de qualquer atividade estatal específica relativa ao contribuinte.", "O exercício regular do poder de polícia ou a utilização de serviço público específico e divisível.", "O acréscimo de valor que da obra resultar para cada imóvel beneficiado."], "a": 1, "c": "A alternativa correta é a B. Uma situação independente de qualquer atividade estatal específica relativa ao contribuinte."}, {"q": "Os impostos são considerados tributos de arrecadação _____.", "o": ["II, IE, IR e IPI.", "Quando o serviço é colocado à disposição do contribuinte, mesmo que ele não o utilize efetivamente.", "Não vinculada.", "A despesa total realizada com a obra pública."], "a": 2, "c": "A alternativa correta é a C. Não vinculada."}, {"q": "O que caracteriza um tributo com fato gerador 'não vinculado'?", "o": ["União.", "Específico; divisível.", "Analogia, princípios gerais de direito tributário, princípios gerais de direito público e equidade.", "A obrigação de pagar surge de um fato do contribuinte (ex: auferir renda) e não de uma ação do Estado."], "a": 3, "c": "A alternativa correta é a D. A obrigação de pagar surge de um fato do contribuinte (ex: auferir renda) e não de uma ação do Estado."}, {"q": "O que é competência tributária?", "o": ["O poder para instituir tributos atribuído pela Constituição Federal exclusivamente aos entes federados.", "Estadual e do Distrito Federal.", "Porque não possui a característica de divisibilidade (é um serviço geral ou uti universi).", "Lei Complementar."], "a": 0, "c": "A alternativa correta é a A. O poder para instituir tributos atribuído pela Constituição Federal exclusivamente aos entes federados."}, {"q": "A competência tributária pode ser delegada de um ente po de atividade administrativa?", "o": ["Municípios.", "A valorização imobiliária decorrente de uma obra pública.", "Sociais, CIDEs, Corporativas e de Iluminação Pública (COSIP).", "Atividade administrativa plenamente vinculada."], "a": 3, "c": "A alternativa correta é a D. Atividade administrativa plenamente vinculada."}];let quiz=0,pos=0,answers=[];const $=id=>document.getElementById(id);function menu(){let s='';for(let i=0;i<10;i++)s+=`<button class="quizBtn" onclick="start(${i})"><b>Quiz ${i+1}</b><span>10 questões comentadas</span></button>`;$('grid').innerHTML=s}function start(i){quiz=i;pos=0;answers=Array(10).fill(null);try{const v=JSON.parse(localStorage.getItem('dtQuiz'+i));if(v&&v.answers)answers=v.answers}catch(e){}$('menu').classList.add('hide');$('result').classList.add('hide');$('game').classList.remove('hide');render()}function render(){const item=BANK[quiz*10+pos];$('meta').textContent=`Quiz ${quiz+1} • Questão ${pos+1} de 10`;$('q').textContent=item.q;$('opts').innerHTML=item.o.map((o,i)=>`<button class="opt" data-i="${i}" onclick="choose(${i})"><b>${'abcd'[i]})</b> ${o}</button>`).join('');$('comment').classList.add('hide');if(answers[pos]!=null)showAnswer(item);$('prev').disabled=pos===0;$('next').textContent=pos===9?'Finalizar':'Avançar'}function choose(i){if(answers[pos]!=null)return;answers[pos]=i;localStorage.setItem('dtQuiz'+quiz,JSON.stringify({answers}));showAnswer(BANK[quiz*10+pos])}function showAnswer(item){document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===item.a)b.classList.add('correct');if(i===answers[pos]&&i!==item.a)b.classList.add('wrong')});$('comment').textContent=item.c;$('comment').classList.remove('hide')}function move(d){if(d>0&&pos===9){finish();return}pos=Math.max(0,Math.min(9,pos+d));render();scrollTo(0,0)}function finish(){const block=BANK.slice(quiz*10,quiz*10+10);let n=block.reduce((s,x,i)=>s+(answers[i]===x.a),0);$('game').classList.add('hide');$('result').classList.remove('hide');$('score').textContent=`${n}/10`;$('msg').textContent=n===10?'Excelente! Treinamento concluído com 100% de aproveitamento.':n>=7?'Muito bom! Revise os comentários das questões erradas.':'Continue treinando. A aprovação é construída questão por questão.'}function restart(){localStorage.removeItem('dtQuiz'+quiz);start(quiz)}function goMenu(){$('game').classList.add('hide');$('result').classList.add('hide');$('menu').classList.remove('hide');scrollTo(0,0)}menu();
